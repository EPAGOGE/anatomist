# nginx configuration for the EPAGOGE web app.
#
# Three responsibilities:
#   1. SPA fallback — any path that doesn't match a real file serves
#      index.html so React Router can handle client-side routing.
#   2. Aggressive cache for /assets/* (Vite emits content-hashed
#      filenames, so they're safe to cache forever).
#   3. No cache on index.html — the entry point must always re-fetch
#      so users pick up new deploys without a hard refresh.
#
# TLS termination is upstream (cloud LB or reverse proxy); this server
# block listens on plain http inside the container.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip the text-y mime types. Vite bundles compress well.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Content-hashed assets — immutable. Vite emits /assets/<name>.<hash>.<ext>.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static files (favicon, robots, etc.) — moderate cache.
    location ~* \.(?:ico|gif|jpe?g|png|webp|svg|woff2?|ttf|eot)$ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback: every other request serves index.html so React Router
    # handles the path client-side. The no-cache header on index.html means
    # deploys are picked up without a hard refresh.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers — the LB can override these if it wants
    # to set its own.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
